<svg xmlns="http://www.w3.org/2000/svg" width="28" height="42" viewBox="0 0 28 42">
  <!-- Index finger — positioned LEFT like a real pointing hand -->
  <rect x="2" y="0" width="9" height="18" rx="4.5" fill="#f7e3a0" stroke="#2a1800" stroke-width="1.3"/>
  <line x1="3.5" y1="10" x2="9.5" y2="10" stroke="#2a1800" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="3.5" y1="14" x2="9.5" y2="14" stroke="#2a1800" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Knuckle bump at base of index finger -->
  <ellipse cx="6.5" cy="17" rx="5.5" ry="2.8" fill="#f7e3a0" stroke="#2a1800" stroke-width="1.1"/>
  <!-- Three folded knuckles (middle, ring, pinky) to the right -->
  <ellipse cx="15" cy="17" rx="4" ry="2.5" fill="#e7c25c" stroke="#2a1800" stroke-width="1.1"/>
  <ellipse cx="21" cy="17" rx="4" ry="2.5" fill="#e7c25c" stroke="#2a1800" stroke-width="1.1"/>
  <ellipse cx="26.5" cy="18.5" rx="3" ry="2" fill="#e7c25c" stroke="#2a1800" stroke-width="1.1"/>
  <!-- Fist body -->
  <rect x="0" y="17" width="28" height="13" rx="3" fill="#e7c25c" stroke="#2a1800" stroke-width="1.3"/>
  <line x1="1.5" y1="24" x2="26.5" y2="24" stroke="#2a1800" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Cuff -->
  <rect x="0" y="29" width="28" height="13" rx="3" fill="#e7c25c" stroke="#2a1800" stroke-width="1.3"/>
  <line x1="1" y1="34" x2="27" y2="34" stroke="#2a1800" stroke-width="1"/>
  <line x1="1" y1="38.5" x2="27" y2="38.5" stroke="#2a1800" stroke-width="1"/>
  <circle cx="5" cy="36.5" r="1.3" fill="#2a1800"/>
  <circle cx="14" cy="36.5" r="1.3" fill="#2a1800"/>
  <circle cx="23" cy="36.5" r="1.3" fill="#2a1800"/>
</svg>
